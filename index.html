<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tic Tac Toe</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}
body{
    background:#1e1e2f;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}
.container{
    text-align:center;
    color:white;
}
h1{
    margin-bottom:10px;
}
#status{
    margin-bottom:20px;
    font-size:22px;
}
.board{
    display:grid;
    grid-template-columns:repeat(3,100px);
    grid-template-rows:repeat(3,100px);
    gap:5px;
    margin:auto;
}
.cell{
    background:white;
    color:black;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:45px;
    font-weight:bold;
    cursor:pointer;
    border-radius:8px;
}
button{
    margin-top:20px;
    padding:10px 20px;
    font-size:18px;
    border:none;
    border-radius:5px;
    background:#28a745;
    color:white;
    cursor:pointer;
}
button:hover{
    background:#218838;
}
</style>
</head>

<body>

<div class="container">
    <h1>Tic Tac Toe</h1>
    <h2 id="status">Player X's Turn</h2>

    <div class="board">
        <div class="cell" onclick="play(this,0)"></div>
        <div class="cell" onclick="play(this,1)"></div>
        <div class="cell" onclick="play(this,2)"></div>
        <div class="cell" onclick="play(this,3)"></div>
        <div class="cell" onclick="play(this,4)"></div>
        <div class="cell" onclick="play(this,5)"></div>
        <div class="cell" onclick="play(this,6)"></div>
        <div class="cell" onclick="play(this,7)"></div>
        <div class="cell" onclick="play(this,8)"></div>
    </div>

    <button onclick="restart()">Restart Game</button>
</div>

<script>
let board=["","","","","","","","",""];
let currentPlayer="X";
let running=true;

const status=document.getElementById("status");

const winPatterns=[
[0,1,2],[3,4,5],[6,7,8],
[0,3,6],[1,4,7],[2,5,8],
[0,4,8],[2,4,6]
];

function play(cell,index){
    if(board[index]!=="" || !running) return;

    board[index]=currentPlayer;
    cell.innerHTML=currentPlayer;

    if(checkWinner()){
        status.innerHTML="🎉 Player "+currentPlayer+" Wins!";
        running=false;
        return;
    }

    if(!board.includes("")){
        status.innerHTML="🤝 Match Draw!";
        running=false;
        return;
    }

    currentPlayer=currentPlayer==="X"?"O":"X";
    status.innerHTML="Player "+currentPlayer+"'s Turn";
}

function checkWinner(){
    for(let pattern of winPatterns){
        let a=board[pattern[0]];
        let b=board[pattern[1]];
        let c=board[pattern[2]];

        if(a!=="" && a===b && b===c){
            return true;
        }
    }
    return false;
}

function restart(){
    board=["","","","","","","","",""];
    currentPlayer="X";
    running=true;
    status.innerHTML="Player X's Turn";

    document.querySelectorAll(".cell").forEach(cell=>{
        cell.innerHTML="";
    });
}
</script>

</body>
</html>
